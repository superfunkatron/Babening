<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#0a0a0a; color:#39ff14; font-family:monospace; 
           display:flex; align-items:center; justify-content:center; 
           min-height:100vh; margin:0; font-size:14px; letter-spacing:2px; }

<body>
  OPENING IN BROWSER...
 <script>
  const hash = window.location.hash;
  const target = 'https://superfunkatron.github.io/Babening/index.html' + (hash || '');
  
  // Try to force open in Chrome specifically
  const chromeIntent = 'intent://' + target.replace('https://', '') + 
    '#Intent;scheme=https;package=com.android.chrome;end';
  
  // On Android, try Chrome intent first, fall back to normal redirect
  const isAndroid = /Android/i.test(navigator.userAgent);
  if (isAndroid) {
    window.location.href = chromeIntent;
    // Fallback after 500ms if intent didn't work
    setTimeout(() => { window.location.replace(target); }, 500);
  } else {
    window.location.replace(target);
  }
</script>
</body>
</html>
